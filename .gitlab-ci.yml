# ──────────────────────────────────────────────────────────────
# PUBLISH
# ──────────────────────────────────────────────────────────────
publish:
  stage: publish
  image: ubuntu:latest
  needs:
    - job: checks
      artifacts: true
    - job: build:wincon:i686
      artifacts: true
      optional: true
    - job: build:wincon:x86_64
      artifacts: true
      optional: true
    - job: build:wincon:aarch64
      artifacts: true
      optional: true
    - job: build:wincon:armv7
      artifacts: true
      optional: true
    - job: build:wingui:i686
      artifacts: true
      optional: true
    - job: build:wingui:x86_64
      artifacts: true
      optional: true
    - job: build:wingui:aarch64
      artifacts: true
      optional: true
    - job: build:wingui:armv7
      artifacts: true
      optional: true
    - job: build:vt:i686
      artifacts: true
      optional: true
    - job: build:vt:x86_64
      artifacts: true
      optional: true
    - job: build:vt:aarch64
      artifacts: true
      optional: true
    - job: build:vt:armv7
      artifacts: true
      optional: true
  rules:
    - if: $CANCEL == "true"
      when: never
    - when: on_success
  script:
    - apt-get update -qq && apt-get install -y -qq curl jq

    # ── Assemble final package ──────────────────────────────────
    - sha256sum *.zip > hashes.txt
    - echo "$BODY" | base64 -d > body.txt

    # ── Upload as GitLab generic package (Artifact mode) ────────
    - |
      if [ "$RELEASE" = "Artifact" ]; then
        PACKAGE_NAME="nano-for-windows_${BUILD}${TAG_SUFFIX}"
        for f in *.zip hashes.txt; do
          curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "$f" \
               "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${BUILD}/$f"
        done
        echo "Uploaded to GitLab Package Registry as: ${PACKAGE_NAME}"
      fi

    # ── Create GitLab Release (Release mode) ────────────────────
    # Requires release-cli; install with: apk add release-cli  (alpine)
    # or grab from: https://gitlab.com/gitlab-org/release-cli
    - |
      if [ "$RELEASE" = "Release" ] || [ "$CI_PIPELINE_SOURCE" != "web" ]; then
        apt-get install -y -qq release-cli || \
          (curl -fsSL \
            "https://gitlab.com/gitlab-org/release-cli/-/releases/v0.24.0/downloads/bin/release-cli-linux-amd64" \
            -o /usr/local/bin/release-cli && chmod +x /usr/local/bin/release-cli)

        DESCRIPTION=$(cat body.txt)
        ASSETS=""
        for f in *.zip hashes.txt; do
          # Upload each asset to generic packages first so it has a URL
          curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "$f" \
               "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/releases/${BUILD}/$f"
          URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/releases/${BUILD}/$f"
          ASSETS="${ASSETS} --assets-link {\"name\":\"$f\",\"url\":\"$URL\"}"
        done

        release-cli create \
          --name "nano for Windows ${BUILD}${TAG_SUFFIX}" \
          --tag-name "${BUILD}${TAG_SUFFIX}" \
          --description "$DESCRIPTION" \
          $ASSETS
      fi

  artifacts:
    paths:
      - "*.zip"
      - hashes.txt
      - body.txt
    expire_in: 1 week

