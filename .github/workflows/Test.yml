# Description: Builds nano for Windows

name: Test
on:
  # schedule:
  #   - cron: '51 */8 * * *'
  # runs at {0,8,16}h51m UTC every day
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Debug session enabled'
        required: false
        default: false
        type: boolean
      release:
        description: 'Delivery Channel'
        required: false
        default: 'Artifact'
        type: choice
        options:
          - "Artifact"
          - "Release"

jobs:
  ## PRECHECK ##############################################################################
  checks:
    name: "✔️ Pre-build checks"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    outputs:
      body: ${{ steps.checks.outputs.body }}
      build: ${{ steps.checks.outputs.build }}
      cancel: ${{ steps.checks.outputs.cancel }}
    steps:
    - name: "✔️ Pre-build checks"
      id: checks
      shell: bash
      run: |
        git clone --depth=1 -n https://git.savannah.gnu.org/git/nano.git
        cd nano
        LAST_NANO=$( TZ=UTC git show --quiet --date='format-local:%Y-%m-%dT%H:%M:%SZ' --format="%cd" )
        CHANGES_NANO="$(git log -1 --pretty=%B)"
        git clone --depth=1 -n https://github.com/Bill-Gray/PDCursesMod.git curses
        cd curses
        echo "Nano last commit DATE:    $LAST_NANO"
        LAST_CURSES=$( TZ=UTC git show --quiet --date='format-local:%Y-%m-%dT%H:%M:%SZ' --format="%cd" )
        echo "Curses last commit DATE:  $LAST_CURSES"
        CHANGES_CURSES="$(git log -1 --pretty=%B)"
        cd ../..
        rm -rf nano
        LAST_RELEASE=$( curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases | sed -nE 's|^.*datetime="([0-9TZ.:-]+).*|\1|p' | head -1 ) \
          || LAST_RELEASE="2000.01.01T00:00:00Z"
        echo "n4win last release DATE:  $LAST_RELEASE"
        if [[ $LAST_NANO > $LAST_RELEASE ]]; then
          echo "NEW NANO SOURCE!!!!"
          echo "# NANO CHANGES" > body.txt
          echo >> body.txt
          echo "$CHANGES_NANO" >> body.txt
          echo >> body.txt
          echo >> body.txt
          cat body.txt
        fi
        if [[ $LAST_CURSES > $LAST_RELEASE ]]; then
          echo "NEW CURSES SOURCE!!!!"
          [ -f body.txt ] && echo >> body.txt
          echo "# PDCursesMod CHANGES" >> body.txt
          echo >> body.txt
          echo "$CHANGES_CURSES" >> body.txt
        fi
        if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
          echo "NEW WINDOWS PATCHES!!!!"
          [ -f body.txt ] && echo >> body.txt
          echo "# WINDOWS PORTABILITY PATCHES" >> body.txt
          echo >> body.txt
        fi

        if [ -f body.txt ]; then
          curl -fsSL -o log.html "https://git.savannah.gnu.org/gitweb/?p=nano.git;a=shortlog"
          NANO_VERSION=$(grep -m 1 "title=\"tags/" log.html | grep -Eo "v[0-9]+\.[0-9]+" | head -1)
          echo "Nano main VERSION: $NANO_VERSION"
          NANO_SUBVER=$( awk '1; /"tag indirect"/{exit}' log.html | grep -c '</tr>')
          echo "Nano SUBVERSION: $NANO_SUBVER"
          [ $NANO_SUBVER -gt 0 ] && NANO_VERSION="${NANO_VERSION}-${NANO_SUBVER}"
          echo "Current nano version: ${NANO_VERSION}"
          LAST_BUILD=$( curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases | sed -nE "s|^.*tag/(v[0-9.-]+).*|\1|p" | head -1 ) || echo "FIRST RELEASE!!!!"
          echo "Last Nano for Windows build: ${LAST_BUILD}"
          LAST_VERSION=$( echo $LAST_BUILD | awk -F '-' '{print $1}' )
          echo "Last Nano for Windows main Version: ${LAST_VERSION}"
          LAST_SUBVER=$(echo $LAST_BUILD | awk -F '[.-]' '{print $3}' )
          echo "Last Nano for Windows Subversion: ${LAST_SUBVER}"
          [ $LAST_SUBVER -gt 0 ] && LAST_VERSION="${LAST_VERSION}-${LAST_SUBVER}"
          echo "Last Nano version: ${LAST_VERSION}"
          if [ "${NANO_VERSION}" == "${LAST_VERSION}" ]; then
            # This is a new Windows build based on the same nano build, probably because there is a new curses patch
            SUBBUILD="$(echo $LAST_BUILD | awk -F . '{print $3}')"
            ((SUBBUILD=SUBBUILD+1))
            [ -z $(echo "$LAST_BUILD" |grep '-') ] \
              && BUILD="${NANO_VERSION}-0.${SUBBUILD}" \
              || BUILD="${NANO_VERSION}.${SUBBUILD}"
          else
            BUILD="${NANO_VERSION}"
          fi
          echo "New Build: ${BUILD}"
          echo "build=${BUILD}" >>  $GITHUB_OUTPUT
          echo "body=$(cat body.txt | base64 -w0)" >>  $GITHUB_OUTPUT
          echo "cancel=false" >>  $GITHUB_OUTPUT
        else
          echo "NO NEW SOURCES. CANCELLING ACTION..."
          echo "cancel=true" >>  $GITHUB_OUTPUT
        fi

  ## BUILD ##############################################################################
  build:
    needs: [ checks ]
    if: needs.checks.outputs.cancel != 'true'
    name: "⚙️ nano4Win ${{ matrix.pretty }} build"
    runs-on: ubuntu-latest
    container: alpine:edge
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: i686,    name: Win32,  short: w32, pretty: 32 bits }
          - { arch: x86_64,  name: Win64,  short: w64, pretty: 64 bits }
          - { arch: aarch64, name: WinARM, short: a64, pretty: on Arm  }
    defaults:
      run:
        shell: bash
    steps:
    - name: "⏬ Download OS tools"
      if: ${{ job.container }}
      shell: sh
      run: |
        apk update && apk upgrade
        apk add bash curl jq tar xz github-cli \
          git make texinfo groff gettext-dev automake autoconf pkgconf coreutils upx p7zip python3 sed patch
        echo "PATH=$(pwd)/llvm-mingw/bin:$PATH" >> $GITHUB_ENV
        # this seems to be needed when running in a container (because of UID mismatch??)
        git config --global --add safe.directory '*'

    - name: "📂 Restore LLVM-MinGW Folder"
      uses: actions/cache@v5
      id: cache-folder
      with:
        # FIX: static key "llvm-folder" never expires; keyed on weekly
        # schedule date so it rebuilds at most once per week, matching
        # the toolchain-builder.yml cadence. Format: YYYY-WNN.
        key: llvm-mingw-${{ github.run_id }}
        restore-keys: |
          llvm-mingw-
        path: llvm-mingw

    - name: 🛒 Checkout
      uses: actions/checkout@v6
      with:
        path: repo

    - name: "⏬ Download Sources"
      run: |
        git clone https://git.savannah.gnu.org/git/nano.git --depth 1
        cd nano
        #git clone https://github.com/Bill-Gray/PDCursesMod.git curses
        git clone https://github.com/Bill-Gray/PDCursesMod.git  curses
        git clone https://git.savannah.gnu.org/git/gnulib.git --depth 1
        autopoint --force
        glibmodules="
            futimens
            getdelim
            getline
            getopt-gnu
            glob
            isblank
            iswblank
            lstat
            mkstemps
            nl_langinfo
            regex
            rewinddir
            sigaction
            snprintf-posix
            stdarg
            strcase
            strcasestr-simple
            strnlen
            sys_wait
            vsnprintf-posix
            wchar
            wctype-h
            wcwidth
        "
        rm -rf lib
        ./gnulib/gnulib-tool --import ${glibmodules}
        aclocal -I m4
        autoconf
        autoheader
        automake --add-missing

    - name: "🪄 Apply Windows Portability Magic"
      run: |
        function _diff() {
          # Thanks to @rasa for this function
          mapfile -t < <(find . -type f -name '*.bak')
          for bak in "${MAPFILE[@]}"; do
            src=${bak/.bak/}
            for ((n=1; ; n++)); do
              patch=${src}-${n}.patch
              test -f "${patch}" || break
            done
            diff -u -w "${bak}" "${src}" >"${patch}" || true
            rm -f "${bak}" || true
            if [[ ! -s "${patch}" ]]; then
              rm -f "${patch}" || true
              continue
            fi
            echo "${patch}":
            cat "${patch}"
          done
          return 0
        }

        cd nano
        ##########################
        ##                        ##
        ##     APPLY PATCHES      ##
        ##                        ##
        ##########################

        echo "0001-win32-include-windows-header.patch"
        sed -i.bak '671i\; 672i\#ifdef _WIN32; 673i\#define WIN32_LEAN_AND_MEAN; 674i\#include <windows.h>; 675i\#endif; 676d' src/definitions.h
        _diff

        echo "0002-win32-drop-bracketed-paste-mode-escape-sequences.patch"
        sed -i.bak '2499d; 2499d; 2499d; 2502d; 1245d; 1245d; 1245d; 1245d; 1245d; 233d; 233d; 233d; 233d' src/nano.c
        sed -i.bak '1558d; 1558d; 1558d; 1558d; 1558d; 1561d; 1535d; 1535d; 1535d; 1535d; 1535d' src/winio.c
        _diff

        echo "0003-win32-system-wide-rcfile-compat.patch"
        sed -i.bak '1746i\          const char *sysconfdir = SYSCONFDIR;; 1747i\; 1748i\#ifdef _WIN32; 1749i\               \/* For the system-wide nanorc file, use SYSCONFDIR if defined; 1750i\       * at compile time; otherwise, use %ALLUSERSPROFILE%\\nanorc. *\/; 1751i\                if (sysconfdir == NULL || sysconfdir[0] == '\\0') {; 1752i\                     sysconfdir = getenv("ALLUSERSPROFILE");; 1753i\                      if (sysconfdir == NULL || sysconfdir[0] == '\\0'); 1754i\                               sysconfdir = "C:\/ProgramData";; 1755i\         }; 1756i\#endif; 1758d; 1758i\               if (have_nanorc(sysconfdir, "\/nanorc")); 1762d' src/rcfile.c
        _diff

        echo "0004-win32-fix-file-parentdir-access.patch"
        sed -i.bak '373d; 373i\     else if (access(parentdir, R_OK) == -1); 377d' src/files.c
        _diff

        echo "0005-win32-replace-slashes-and-invalid-filename-chars.patch"
        sed -i.bak '2428i\  normalize_slashes(retval);; 2429i\; 2433d; 1630d; 1630i\                                if (strchr("<>:\\"\/\\\\|?*", thename[i])); 1480i\      normalize_slashes(extension);; 1438i\        normalize_slashes(target);; 1439i\' src/files.c
        sed -i.bak '415i\           normalize_slashes(phrase);; 419d' src/history.c
        sed -i.bak '561i\void normalize_slashes(char *path);; 565d' src/prototypes.h
        sed -i.bak '74i\    normalize_slashes(joined);; 75i\; 79d; 65i\\/* Replace any backslashes with slashes in the given path. *\/; 66i\void normalize_slashes(char *path); 67i\{; 68i\ if (path == NULL); 69i\              return;; 70i\; 71i\     for (; *path; ++path); 72i\             if (*path == '\\\\'); 73i\                      *path = '\/';; 74i\}; 75i\' src/utils.c
        _diff

        echo "0006-win32-homedir-tempdir-compat.patch"
        sed -i.bak '1479d; 1479i\           tempdir = copy_of("~\/AppData\/Local\/Temp\/");; 1483d; 1465d; 1465i\   const char *env_dir = getenv("TEMP");' src/files.c
        sed -i.bak '38d; 38d; 38d; 38d; 38i\                if (homenv == NULL || *homenv == '\\0'); 39i\                   homenv = getenv("USERPROFILE");; 41d; 41d; 41d; 41d; 41i\               if (homenv == NULL || *homenv == '\\0'); 42i\                        homenv = getenv("ALLUSERSPROFILE");; 46d' src/utils.c
        _diff

        echo "0007-win32-file-io-to-binary-mode.patch"
        sed -i.bak '1845i\  \/* Default file i\/o operation to binary mode as linux does.; 1846i\    *  https:\/\/learn.microsoft.com\/en-us\/cpp\/c-runtime-library\/text-and-binary-mode-file-i-o; 1847i\       *\/; 1848i\    _set_fmode(_O_BINARY);; 1849i\; 1853d' src/nano.c
        _diff

        echo "0008-win32-utf8-support-and-detect-wide-char-width.patch"
        sed -i.bak '328d; 328i\                     int width = uc_width(wc, "UTF-8");; 332d; 243d; 243i\   return (uc_width(wc, "UTF-8") == 0);; 222d; 222i\       return (uc_width(wc, "UTF-8") == 2);; 23i\#include "uniwidth.h"' src/chars.c
        sed -i.bak '1870d; 1870i\   setlocale(LC_ALL, "");; 1874d' src/nano.c
        sed -i.bak '1905d; 1905i\           charwidth = uc_width(wc, "UTF-8");; 1909d; 24i\#include "uniwidth.h"' src/winio.c
        _diff

        echo "0009-win32-windows-conhost-read-stdin-data.patch"
        sed -i.bak '864i\   int fd;; 871d; 871i\                                                    "type a ^Z line to finish.\\n"));; 874d; 874i\  fd = dup(0);; 875i\     stream = fdopen(fd, "rb");; 878i\            if(fd != -1); 879i\                     close(fd);; 883d; 848d; 848i\   int thetty = open("CONIN$", O_RDONLY);' src/nano.c
        _diff

        echo "0010-win32-remove-halfdelay-for-unicode.patch"
        sed -i.bak '216d; 216d; 216d; 219d' src/winio.c
        _diff

        echo "0011-win32-keycode-pdcursesmod-compat.patch"
        sed -i '194d; 194d; 194d; 194d; 194d; 194d; 194d; 194d; 194d; 194d; 194i\#define ALT_PAGEUP    ALT_PGUP; 195i\#define ALT_PAGEDOWN  ALT_PGDN; 196i\#define ALT_INSERT    ALT_INS; 197i\#define ALT_DELETE    ALT_DEL; 201d; 180d; 180d; 180d; 180d; 180d; 180d; 180d; 180i\#define CONTROL_LEFT    CTL_LEFT; 181i\#define CONTROL_RIGHT   CTL_RIGHT; 182i\#define CONTROL_UP      CTL_UP; 183i\#define CONTROL_DOWN    CTL_DOWN; 184i\#define CONTROL_HOME    CTL_HOME; 185i\#define CONTROL_END     CTL_END; 186i\#define CONTROL_DELETE  CTL_DEL' src/definitions.h
        echo "fist applied"
        sed -i "1360d; 1360i\   add_to_sclist(MMAIN, \"M-Bsp\", ALT_BKSP, chop_previous_word, 0);; 1364d; 381d; 381d; 381i\                     if (keystring[2] == ','); 382i\                     return ALT_COMMA;; 383i\                 else if (keystring[2] == '-'); 384i\                            return ALT_MINUS;; 385i\                        else if (keystring[2] == '.'); 386i\return ALT_STOP;; 387i\                  else if (keystring[2] == '\/'); 388i\                           return ALT_FSLASH;; 389i\                       else if ('0' <= keystring[2] \&\& keystring[2] <= '9'); 390i\                                return keystring[2] + ALT_0 - '0';; 391i\                       else if (keystring[2] == ';'); 392i\                            return ALT_SEMICOLON;; 393i\                 else if (keystring[2] == '='); 394i\                            return ALT_EQUAL;; 395i\                        else if ('A' <= (keystring[2] \& 0x5F) \&\& (keystring[2] \& 0x5F) <= 'Z'); 396i\                            return (keystring[2] \& 0x5F) + ALT_A - 'A';; 397i\                     else if (keystring[2] == '['); 398i\        return ALT_LBRACKET;; 399i\                      else if (keystring[2] == '\\\\'); 400i\                         return ALT_BSLASH;; 401i\                       else if (keystring[2] == ']'); 402i\                         return ALT_RBRACKET;" src/global.c
        echo "second applied"
        sed -i '1265d; 1268d; 1252i\                    if (modifiers == PDC_KEY_MODIFIER_CONTROL); 1253i\                              keycode = convert_to_control(keycode);; 1257d; 1257i\       if (modifiers == (PDC_KEY_MODIFIER_SHIFT | PDC_KEY_MODIFIER_ALT)) {; 1242d; 1242i\               if (modifiers \& PDC_KEY_MODIFIER_CONTROL) {; 1208d; 1208d; 1208d; 1208d; 1208d; 1209d; 1209i\       if (!mute_modifiers) {; 1212d; 1212i\           if (modifiers \& PDC_KEY_MODIFIER_SHIFT) {; 1215d; 1215i\                       if (keycode == KEY_SDC \&\& modifiers == PDC_KEY_MODIFIER_SHIFT); 1217d; 1217i\                      if (keycode == KEY_SDC \&\& modifiers \& PDC_KEY_MODIFIER_CONTROL); 1219d; 1219i\                       if (modifiers == (PDC_KEY_MODIFIER_SHIFT | PDC_KEY_MODIFIER_CONTROL)); 1220i\                                keycode = convert_to_control(keycode);; 1221i\                  if (!meta_key \&\& !(modifiers \& PDC_KEY_MODIFIER_CONTROL)); 1225d; 1225i\          if (modifiers == PDC_KEY_MODIFIER_ALT) {; 1039i\                \/* Diambiguate some control keystrokes: ^H|BACKSPACE, ^M|ENTER *\/; 1040i\             if (!(modifiers \& PDC_KEY_MODIFIER_CONTROL)) {; 1041i\                      switch (keycode) {; 1042i\                              case '\\b': return KEY_BACKSPACE;; 1043i\                   case '\\r': return KEY_ENTER;; 1044i\                    }; 1045i\               }; 1047d; 1047i\                if (!modifiers \&\& keycode < 0xFF \&\& keycode != '\\t' \&\& keycode != DEL_CODE); 1023i\   unsigned long modifiers = PDC_get_key_modifiers();; 309d; 309i\         if (waiting_codes + 1 == capacity); 312i\               if (GetAsyncKeyState(VK_LMENU) < 0); 313i\  key_buffer[waiting_codes++] = ESC_CODE;; 314i\; 269d; 269d; 270d; 270i\  waiting_codes = 0;; 271i\; 272i\        if (GetAsyncKeyState(VK_LMENU) < 0); 273i\              key_buffer[waiting_codes++] = ESC_CODE;; 274i\; 275i\        key_buffer[waiting_codes++] = input;' src/winio.c
        echo "third applied"
        _diff

        echo "0012-win32-colortype-pdcursesmod-compat.patch"
        sed -i.bak '391d; 391i\     chtype attributes;; 395d' src/definitions.h
        sed -i.bak '272d; 272i\chtype interface_color_pair[NUMBER_OF_ELEMENTS] = {0};; 276d; 150d; 150i\chtype *bardata = NULL;' src/global.c
        sed -i.bak '2448d; 2448i\   bardata = nrealloc(bardata, LINES * sizeof(chtype));; 2452d; 1067d; 1067i\      bardata = nrealloc(bardata, LINES * sizeof(chtype));' src/nano.c
        sed -i.bak '184d; 184i\extern chtype interface_color_pair[NUMBER_OF_ELEMENTS];; 188d; 105d; 105i\extern chtype *bardata;' src/prototypes.h
        sed -i.bak "1165d; 1165i\   chtype attributes;; 1169d; 1103d; 1103i\bool parse_combination(char *combotext, short *fg, short *bg, chtype *attributes); 1025d; 1025i\        \/* PDCursesMod maximum possible COLORS is 768, see:; 1026i\  *  curspriv.h - PDC_MAXCOL; 1027i\      *  https:\/\/github.com\/Bill-Gray\/PDCursesMod\/blob\/master\/docs\/HISTORY.md#pdcurses-39---2019-09-04; 1028i\     *\/; 1029i\    if (COLORS < 256)" src/rcfile.c
        sed -i.bak "2312d; 2312i\   chtype colorpair;; 2316d" src/winio.c
        _diff

        echo "0013-win32-window-resize-handling-and-screen-redraw.patch"
        sed -i.bak "226i\; 227i\            \/* SIGWINCH is not available on Windows, so we simulate the effect of; 228i\            * the `handle_sigwinch` handler by checking for PDCurses's KEY_RESIZE. *\/; 229i\           if (input == KEY_RESIZE) {; 230i\                       the_window_resized = TRUE;; 231i\                       resized_for_browser = TRUE;; 232i\              }; 233i\; 237d" src/winio.c
        _diff

        echo "0014-win32-formatter-and-spell-check-support.patch"
        sed -i.bak "2575d; 2575d; 2575i\    else {; 2576i\          \/\/ do_int_speller(temp_name);; 2577i\         statusline(ALERT, _(\"Internal spell checker is not supported in this build\"));; 2578i\               return;; 2579i\ }; 2583d; 2240i\; 2241i\#elif defined(_WIN32); 2242i\   ssize_t was_lineno = openfile->current->lineno;; 2243i\ size_t was_pww = openfile->placewewant;; 2244i\      size_t was_x = openfile->current_x;; 2245i\     bool was_at_eol = (openfile->current->data[openfile->current_x] == '\\0');; 2246i\      FILETIME timestamp;; 2247i\     bool have_timestamp = FALSE;; 2248i\ static char **arguments = NULL;; 2249i\ PROCESS_INFORMATION pi;; 2250i\ STARTUPINFO si;; 2251i\ DWORD exit_code;; 2252i\        char *command_line = NULL;; 2253i\  size_t cmd_len = 0;; 2254i\      bool replaced = FALSE;; 2255i\; 2256i\  \/* Get file attributes up front.  If the size is zero, there is nothing; 2257i\         * to do; otherwise, remember the time of modification. *\/; 2258i\  {; 2259i\               WIN32_FILE_ATTRIBUTE_DATA attrs;; 2260i\; 2261i\                if (GetFileAttributesEx(tempfile_name, GetFileExInfoStandard, \&attrs)) {; 2262i\                    if (attrs.nFileSizeHigh == 0 \&\& attrs.nFileSizeLow == 0) {; 2263i\#ifndef NANO_TINY; 2264i\                           if (spelling \&\& openfile->mark); 2265i\                                    statusline(AHEM, _(\"Selection is empty\"));; 2266i\                              else; 2267i\#endif; 2268i\                                  statusline(AHEM, _(\"Buffer is empty\"));; 2269i\                          return;; 2270i\                 }; 2271i\; 2272i\                       timestamp = attrs.ftLastWriteTime;; 2273i\  have_timestamp = TRUE;; 2274i\           }; 2275i\       }; 2276i\; 2277i\       \/* The spell checker needs the screen, so exit from curses mode. *\/; 2278i\   if (spelling); 2279i\       endwin();; 2280i\        else; 2281i\            statusbar(_(\"Invoking formatter...\"));; 2282i\; 2283i\  construct_argument_list(\&arguments, theprogram, tempfile_name);; 2284i\; 2285i\    \/* Build command line string from arguments array. *\/; 2286i\  for (int i = 0; arguments[i] != NULL; i++) {; 2287i\            \/* Account for the argument length plus a space. *\/; 2288i\cmd_len += strlen(arguments[i]) + 1;; 2289i\    }; 2290i\; 2291i\       command_line = nmalloc(cmd_len + 1);; 2292i\    command_line[0] = '\\0';; 2293i\; 2294i\        for (int i = 0; arguments[i] != NULL; i++) {; 2295i\         if (i > 0); 2296i\                      strcat(command_line, \" \");; 2297i\              strcat(command_line, arguments[i]);; 2298i\     }; 2299i\; 2300i\    \/* Initialize structures for CreateProcess. *\/; 2301i\        ZeroMemory(\&si, sizeof(si));; 2302i\   si.cb = sizeof(si);; 2303i\     ZeroMemory(\&pi, sizeof(pi));; 2304i\; 2305i\\/* Create and execute the process. *\/; 2306i\ if (CreateProcess(NULL, command_line, NULL, NULL, FALSE, 0, NULL, NULL, \&si, \&pi)) {; 2307i\          \/* Wait for the process to complete. *\/; 2308i\            WaitForSingleObject(pi.hProcess, INFINITE);; 2309i\; 2310i\             \/* Get the exit code. *\/; 2311i\              if (!GetExitCodeProcess(pi.hProcess, \&exit_code)) {; 2312i\                 exit_code = 1;; 2313i\          }; 2314i\; 2315i\               \/* Close process and thread handles. *\/; 2316i\               CloseHandle(pi.hProcess);; 2317i\            CloseHandle(pi.hThread);; 2318i\        } else {; 2319i\                exit_code = 9;  \/* Simulate the fork\/exec error behavior. *\/; 2320i\ }; 2321i\; 2322i\       \/* After spell checking, restore terminal state and reenter curses mode;; 2323i\     * after formatting, make sure that any formatter output is wiped. *\/; 2324i\  if (spelling) {; 2325i\     terminal_init();; 2326i\         doupdate();; 2327i\#ifndef NANO_TINY; 2328i\            if (the_window_resized); 2329i\                 regenerate_screen();; 2330i\#endif; 2331i\      } else; 2332i\               full_refresh();; 2333i\; 2334i\ if (exit_code == 9) {; 2335i\           statusline(ALERT, _(\"Could not execute '%s'\"), arguments[0]);; 2336i\           free(arguments[0]);; 2337i\          free(command_line);; 2338i\             return;; 2339i\ } else if (exit_code > 2) {; 2340i\             statusline(ALERT, _(\"Error invoking '%s'\"), arguments[0]);; 2341i\           free(arguments[0]);; 2342i\             free(command_line);; 2343i\             return;; 2344i\ } else if (exit_code != 0); 2345i\              statusline(ALERT, _(\"Program '%s' complained\"), arguments[0]);; 2346i\; 2347i\       free(arguments[0]);; 2348i\     free(command_line);; 2349i\; 2350i\     \/* When the temporary file wasn't touched, say so and leave. *\/; 2351i\    if (have_timestamp) {; 2352i\           WIN32_FILE_ATTRIBUTE_DATA attrs;; 2353i\; 2354i\                if (GetFileAttributesEx(tempfile_name, GetFileExInfoStandard, \&attrs) \&\&; 2355i\                          CompareFileTime(\&attrs.ftLastWriteTime, \&timestamp) == 0) {; 2356i\                   statusline(REMARK, _(\"Nothing changed\"));; 2357i\           return;; 2358i\          }; 2359i\       }; 2360i\; 2361i\#ifndef NANO_TINY; 2362i\      \/* Replace the marked text (or entire text) with the corrected text. *\/; 2363i\       if (spelling \&\& openfile->mark) {; 2364i\          ssize_t was_mark_lineno = openfile->mark->lineno;; 2365i\               bool upright = mark_is_before_cursor();; 2366i\; 2367i\         replaced = replace_buffer(tempfile_name, CUT, \"spelling correction\");; 2368i\; 2369i\                \/* Adjust the end point of the marked region for any change in; 2370i\          * length of the region's last line. *\/; 2371i\             if (upright); 2372i\                    was_x = openfile->current_x;; 2373i\            else; 2374i\                    openfile->mark_x = openfile->current_x;; 2375i\; 2376i\              \/* Restore the mark. *\/; 2377i\               openfile->mark = line_from_number(was_mark_lineno);; 2378i\     } else; 2379i\#endif; 2380i\        replaced = replace_buffer(tempfile_name, CUT_TO_EOF,; 2381i\                                     \/* TRANSLATORS: The next two go with Undid\/Redid messages. *\/; 2382i\                    (spelling ? N_(\"spelling correction\") : N_(\"formatting\")));; 2383i\; 2384i\      \/* Go back to the old position. *\/; 2385i\    goto_line_posx(was_lineno, was_x);; 2386i\      if (was_at_eol || openfile->current_x > strlen(openfile->current->data)); 2387i\             openfile->current_x = strlen(openfile->current->data);; 2388i\; 2389i\  if (replaced) {; 2390i\#ifndef NANO_TINY; 2391i\             openfile->filetop->has_anchor = FALSE;; 2392i\          update_undo(COUPLE_END);; 2393i\#endif; 2394i\  }; 2395i\; 2396i\       openfile->placewewant = was_pww;; 2397i\     adjust_viewport(STATIONARY);; 2398i\; 2399i\    if (spelling); 2400i\           statusline(REMARK, _(\"Finished checking spelling\"));; 2401i\    else; 2402i\            statusline(REMARK, _(\"Buffer has been processed\"));; 2403i\; 2404i\#else; 2405i\#error \"Platform not supported for spell checking\/formatting\"" src/text.c
        _diff

        echo "0015-win32-poshistory-item-windows-path-compat.patch"
        sed -i.bak '417i\; 418i\#ifdef _WIN32; 419i\                \/* Keep Windows drive letters by rewinding to the drive prefix; 420i\           * when the first slash is part of X:\/; 421i\       *\/; 422i\              if (stanza != NULL \&\& stanza - phrase >= 2 \&\& stanza[-1] == ':' \&\&; 423i\                         isalpha((unsigned char)stanza[-2])); 424i\                  stanza -= 2;; 425i\#endif; 426i\; 430d; 26i\#include <ctype.h>' src/history.c
        _diff

        echo "0016-win32-pdcursesmod-ctrlv-passthrough.patch"
        sed -i.bak "1854i\#ifdef __PDCURSESMOD__; 1855i\    \/* When using PDCursesMod, we want to disable the default Ctrl+V behavior of; 1856i\    * pasting text from the system clipboard, so that Ctrl+V behaves as a normal; 1857i\         * keystroke that paste text from nano's cutbuffer instead. *\/; 1858i\ PDC_set_function_key(FUNCTION_KEY_PASTE, 0);; 1859i\#endif; 1860i\; 1864d" src/nano.c
        _diff

        echo "0017-new-colors.patch"
        sed -i.bak "1046d; 1046i\                                                     142, 186, 136, 166, 161, 31, 50, 54, 64,; 1047i\                                                                       105, 118, 125, 143, 146, 178, 180, 206, 209,; 1048i\                                                                       210, 220, 223, 227, 228, 230, 149, 137, 93,; 1049i\                                                                       52, 26, 99, 138, 171, 225, 77, 160, 27,; 1050i\                                                                       226, 196, 214, 60, 201, 219, 106, 69, 123,; 1051i\                                                                       90, 202, 22, 190, 33, 153, 88, 101, 203, 89,; 1052i\                                                                       42, 142,; 1038d; 1038i\                                                                \"brick\", \"crimson\", \"steel\",; 1039i\                                                                                  \"aqua\", \"indigo\", \"olive\",; 1040i\                                                                                  \"grape\", \"vert\", \"maroon\",; 1041i\                                                                                  \"khaki\", \"silver\", \"amber\",; 1042i\                                                                                  \"tan\", \"hotpink\", \"salmon\",; 1043i\                                                                                  \"coral\", \"gold\", \"navajo\",; 1044i\                                                                                  \"lemon\", \"canary\", \"cream\",; 1045i\                                                                                  \"junebud\", \"camel\", \"violet\",; 1046i\                                                                                  \"cocoa\", \"royal\", \"lilac\",; 1047i\                                                                                  \"beige\", \"helio\", \"selago\",; 1048i\                                                                                  \"spring\", \"alarm\", \"azul\",; 1049i\                                                                                  \"banana\", \"scarlet\", \"carrot\",; 1050i\                                                                                  \"scampi\", \"unicorn\", \"piggy\",; 1051i\                                                                                  \"frog\", \"dodger\", \"frost\",; 1052i\                                                                                  \"voodoo\", \"tomato\", \"forest\",; 1053i\                                                                                  \"volt\", \"azure\", \"baby\",; 1054i\                                                                                  \"blood\", \"moss\", \"bitter\",; 1055i\                                                                                  \"boysen\", \"cuba\", \"citron\",; 1026d; 1026i\#define COLORCOUNT  86" src/rcfile.c
        _diff

        # 1. realpath() workaround
        echo -e "\n\nPATCH: realpath() workaround applied."
        cp -p ./src/definitions.h{,.bak}
        echo " " >> ./src/definitions.h
        echo "#ifdef _WIN32" >> ./src/definitions.h
        echo "#include <windows.h>"  >> ./src/definitions.h
        echo "#include \"uniwidth.h\""  >> ./src/definitions.h
        echo "#define realpath(N,R) _fullpath((R),(N),0)" >> ./src/definitions.h
        echo "#endif" >> ./src/definitions.h
        _diff

        # Fix wchar_t 16 bits limitation to display emojis and supplemental codepoints
        echo -e "\n\nPATCH: change to 32 bits wchar_t."
        #sed -i.bak 's|#define realpath(N,R) _fullpath((R),(N),0)|&#\n#define wchar_t int|' src/definitions.h
        #sed -i.bak '1,/#/ s/#/#define wchar_t int\n&/' src/definitions.h curses/curses.h
        printf '\n#define wchar_t int\n' >> src/definitions.h
        _diff

        # default open() files in binary mode as linux does
        echo -e "\n\nPATCH: Forcing file management in binary mode like the Linux version."
        sed -i.bak 's/O_..ONLY/& | _O_BINARY/g' ./src/files.c
        _diff
        sed -i.bak 's/O_..ONLY/& | _O_BINARY/g' ./src/text.c
        _diff

        # Enable UTF-8 Terminal
        echo -e "\n\nPATCH: Enable UTF-8 console."
        sed -i.bak 's|vt220||g
            /x1B/d
            /nl_langinfo(CODESET)/ c\\tsetlocale(LC_ALL, "");'  src/nano.c
        _diff

        # Fix for unicode char width detection using GNUlib internal function
        echo -e "\n\nPATCH: unicode char width detection using GNUlib internal function."
        sed -i.bak 's|wcwidth(wc)|uc_width(wc, "UTF-8")|g'  src/chars.c src/winio.c
        sed -i '/prototypes.h/a#include "uniwidth.h"'  src/chars.c
        _diff

        ####                               ####
        ####   LLVM-MING SPECIFIC PATCHES  ####
        ####                               ####

        # Fix folder access test
        echo -e "\n\nPATCH: Porting folder accessibility from executable to read access."
        sed -i.bak "s/X_OK/R_OK/" src/files.c
        _diff

        # GNUlib glob wraps opendir with its own gl_directory type, so dir is
        # struct gl_directory* by the time rewinddir is called. Cast it to DIR*.
        echo -e "\n\nPATCH: fix GNUlib glob DIR* conflict in browser.c."
        sed -i.bak 's/rewinddir(dir)/rewinddir((DIR *)dir)/' src/browser.c
        _diff

        ####                               ####
        ####    BRANDING and VERSIONING    ####
        ####                               ####

        cd curses
        CURSES="v$( sed -nE 's/^.*PDC_VER_MAJOR\s*([0-9]+)/\1/p' curses.h )"
        CURSES="${CURSES}.$( sed -nE 's/^.*PDC_VER_MINOR\s*([0-9]+)/\1/p' curses.h )"
        CURSES="${CURSES}.$( sed -nE 's/^.*PDC_VER_CHANGE\s*([0-9]+)/\1/p' curses.h )"
        CURSES_DATE=$(TZ=UTC git show --quiet --date='format-local:%Y.%m.%d' --format="%cd")
        CURSES="PDCursesMod ${CURSES} build $(git rev-list --count HEAD), ${CURSES_DATE}"
        cd ..
        sed -i.bak 's/ GNU nano from git,//' src/nano.c
        sed -i 's|Compiled options|Project info at https://github.com/gfunkmonk/nano-for-windows\\n Using '"${CURSES}"'\\n &|' src/nano.c
        _diff

    - name: "⚙️ Compile curses lib for ${{ matrix.name}}"
      run: |
        ##########################
        ##                        ##
        ##     COMPILE CURSES     ##
        ##                        ##
        ##########################

        PDTERM="wincon"
        echo "PDTERM=${PDTERM}" >> $GITHUB_ENV
        export CFLAGS="-Oz -fno-math-errno -flto -std=c17 -Wno-error"
        cd "nano/curses/${PDTERM}"
          make -j$(($(nproc)*2)) WIDE=Y UTF8=Y _${{matrix.short}}=Y

    - name: "🔧 Configure Nano Build"
      run: |
        ##########################
        ##                        ##
        ##     CONFIGURE BUILD    ##
        ##                        ##
        ##########################
        # FIX: capture CWD at step start and export to GITHUB_ENV so subsequent
        # steps can reference it even after cd calls shift the working directory.
        CWD=$(pwd)
        echo "BUILD_CWD=${CWD}" >> $GITHUB_ENV

        TARGET="${{ matrix.arch }}-w64-mingw32"
        OUTDIR="${CWD}/nano/pkg"
        CURSES_DIR="${CWD}/nano/curses"
        export CFLAGS="-O3 -Oz -fno-math-errno -flto -DPDC_FORCE_UTF8 -DPDC_NCMOUSE -std=c17 -Wno-error"
        export LDFLAGS="-L${CURSES_DIR}/${{ env.PDTERM }} -static -static-libgcc ${CURSES_DIR}/${{ env.PDTERM }}/pdcurses.a"
        export NCURSESW_CFLAGS="-I${CURSES_DIR} -DNCURSES_STATIC  -DENABLE_MOUSE"
        export NCURSESW_LIBS="-l:pdcurses.a -lwinmm"
        export LIBS="-lbcrypt"
        # Configure nano
        mkdir -p nano/build
        cd nano/build
          ../configure --host="${TARGET}" --prefix="${OUTDIR}" \
              --enable-{utf8,threads=windows} --disable-{nls,speller} \
              --sysconfdir="C:\\ProgramData" || cat config.log
          echo "
            #define HAVE_FREXP_IN_LIBC 1
            #define HAVE_FREXPL_IN_LIBC 1
            #define HAVE_SNPRINTF_RETVAL_C99 1
            #define HAVE_SNPRINTF_TRUNCATION_C99 1
            #define MBRTOWC_EMPTY_INPUT_BUG 1
          " >> config.h
          sed -i "/#define NEED_PRINTF_DIRECTIVE_A 1/d" config.h
          sed -i "/#define NEED_PRINTF_DIRECTIVE_F 1/d" config.h
          sed -i "/#define NEED_PRINTF_FLAG_GROUPING 1/d" config.h
          sed -i "/#define NEED_PRINTF_FLAG_ZERO 1/d" config.h
          sed -i "/#define NEED_PRINTF_INFINITE_DOUBLE 1/d" config.h
          sed -i "/#define NEED_PRINTF_UNBOUNDED_PRECISION 1/d" config.h
          # sed -i "/#define __GETOPT_PREFIX rpl_/d" config.h
          #BRANDING="GNU nano for Windows ${{ matrix.pretty }}, ${{ needs.checks.outputs.build }} $(TZ=UTC date +'%Y.%m.%d')"
          BRANDING="GNU nano for ${{ matrix.name }} ${{ needs.checks.outputs.build }}"
          echo "#define REVISION \"${BRANDING}\"" > src/revision.h

    - name: "⚙️ Build for Windows ${{ matrix.pretty }}"
      run: |
        ##########################
        ##                        ##
        ##     BUILD NANO         ##
        ##                        ##
        ##########################
        cd nano/build
          make -j$(($(nproc)*2)) && \
          make install || exit 1

    - name: "📦 Create Package"
      run: |
        # FIX: use $BUILD_CWD env var (set in Configure step) instead of
        # $(pwd) which would point to a different directory at this point.
        CWD="${BUILD_CWD}"
        cd nano/pkg
          export UPX="--lzma --best"
          #curl -fsSL -O https://raw.githubusercontent.com/gfunkmonk/nano-for-windows/releases/LICENSE
          #curl -fsSL -O https://raw.githubusercontent.com/gfunkmonk/nano-for-windows/releases/README.md
          cp ${CWD}/repo/LICENSE .
          cp ${CWD}/repo/README.md .
          mv bin/nano.exe share/doc/nano/* "${CWD}/nano/doc/sample.nanorc.in" .
          #mv share/nano syntax
          git clone https://github.com/gfunkmonk/nanorc syntax
          cd syntax
          rm -fr .git/
          cd ..
          mv sample.nanorc.in .nanorc
          rm -rf bin share rnano*
          llvm-strip -s nano.exe
          upx nano.exe || true
          ls -als
          7z a -mx9 -mm=Deflate64 -mmt$(nproc) "${CWD}/nano-for-windows_${{matrix.name}}_${{ needs.checks.outputs.build }}.zip" * .nanorc

    - name: "👍 Upload Artifact nano-for-windows_${{ matrix.name }}_${{ needs.checks.outputs.build }}.zip"
      uses: actions/upload-artifact@v7
      with:
        name: nano-for-windows_${{ matrix.name }}_${{ needs.checks.outputs.build }}
        path: |
          *.zip


    - name: "🔧 Prepare debug session"
      if: github.event.inputs.debug_enabled == 'true'
      run: |
        apk add bash nano-syntax iproute2 util-linux-misc
        curl -fsSL -o /usr/local/bin/oh-my-posh https://github.com/JanDeDobbeleer/oh-my-posh/releases/latest/download/posh-linux-amd64
        chmod +x /usr/local/bin/oh-my-posh
        curl -fsSL -o /etc/nanorc https://github.com/okibcn/miniU/raw/main/Github_Linux/.nanorc
        curl -fsSL -o ~/.zshrc https://github.com/okibcn/miniU/raw/main/Github_Linux/profile.sh
        cat ~/.zshrc >> ~/.bashrc

    - name: "🐞 Debug session"
      uses: mxschmitt/action-tmate@v3
      if: github.event.inputs.debug_enabled == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ## PUBLISH ##############################################################################
  publish:
    if: needs.checks.outputs.cancel != 'true'
    needs:
    - checks
    - build
    name: "📨 Publish ${{ github.event.inputs.release }}"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
    - name: "📬 Receive Packages"
      uses: actions/download-artifact@v8
      with:
        path: ./

    - name: "🚮 Recycle Packaging"
      uses: geekyeggo/delete-artifact@v6
      with:
          name: '*'

    - name: "📦 Prepare Final Package"
      run: |
        mv nano-for*/* .
        sha256sum *.zip > hashes.txt
        echo "${{ needs.checks.outputs.body }}" | base64 -d > body.txt

    - name: "👍 Upload nano-for-windows_${{ needs.checks.outputs.build }} as Artifact"
      uses: actions/upload-artifact@v7
      if: github.event.inputs.release == 'Artifact'
      with:
        name: nano-for-windows_${{ needs.checks.outputs.build }}
        path: |
          *.zip
          *.txt

    - name: "🎉 Publish Release ${{ needs.checks.outputs.build }}"
      uses: softprops/action-gh-release@v3
      # WARNING: before using this action go to https://github.com/OWNER/REPO/settings/actions
      # and in **Workflow Permissions** section give actions **Read and Write permissions**.
      if: github.event_name != 'workflow_dispatch' || github.event.inputs.release == 'Release'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        prerelease: false
        draft: false
        make_latest: true
        tag_name: ${{ needs.checks.outputs.build }}
        body_path: body.txt
        files: |
          ./*.zip
          ./hashes.txt


    - name: "🔧 Prepare debug session"
      if: github.event.inputs.debug_enabled == 'true'
      run: |
        sudo apt install zsh zsh-syntax-highlighting
        sudo curl -fsSL -o /usr/local/bin/oh-my-posh https://github.com/JanDeDobbeleer/oh-my-posh/releases/latest/download/posh-linux-amd64
        sudo chmod +x /usr/local/bin/oh-my-posh
        curl -fsSL -o ~/.nanorc https://github.com/okibcn/miniU/raw/main/Github_Linux/.nanorc
        curl -fsSL -o ~/.zshrc https://github.com/okibcn/miniU/raw/main/Github_Linux/profile.sh
        cp /etc/bash.bashrc ~
        cat ~/.zshrc >> ~/bash.bashrc
        sudo cp ~/bash.bashrc /etc/bash.bashrc -f

    - name: "🐞 Debug session"
      uses: mxschmitt/action-tmate@v3
      if: github.event.inputs.debug_enabled == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
