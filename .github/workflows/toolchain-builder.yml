name: Toolchain Builder

on:
  schedule:
    - cron: '51 10 * * SAT'
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Debug session enabled'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Builds toolchain
    runs-on: ubuntu-latest
    container: 
      image: alpine:edge
      options: --user root
    
    steps:
    - name: "⏬ Install Base Dependencies"
      shell: sh
      run: |
        apk update && apk upgrade
        apk add git bash curl jq tar build-base python3 cmake linux-headers coreutils perl openssh-client xz
        # Ensure the bin directory exists for the path export
        mkdir -p $HOME/.local/bin
        echo "PATH=$HOME/.local/bin:$PATH" >> $GITHUB_ENV
        git config --global --add safe.directory '*'

    - name: "💾 Cache Toolchain"
      uses: actions/cache@v5 # Use v4 for better Node 20 compatibility
      id: cache-toolchain
      with:
        path: llvm-mingw
        key: llvm-mingw-${{ github.run_id }}
        restore-keys: |
          llvm-mingw-

    - name: "🔧 Prepare debug session"
      if: github.event.inputs.debug_enabled == 'true'
      shell: bash
      run: |
        apk add nano iproute2 util-linux
        curl -fsSL https://github.com/JanDeDobbeleer/oh-my-posh/releases/latest/download/posh-linux-amd64 -o /usr/local/bin/oh-my-posh
        chmod +x /usr/local/bin/oh-my-posh
        # Minimal bash config for debug
        echo 'eval "$(oh-my-posh init bash)"' >> ~/.bashrc

    - name: "🐞 Debug session"
      uses: mxschmitt/action-tmate@v3
      if: github.event.inputs.debug_enabled == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: "⚙️ Build LLVM-MinGW Master"
      shell: bash
      run: |
        echo "Using SHELL: $SHELL"
        # Only clone if the directory doesn't exist (if cache miss)
        if [ ! -d "llvm" ]; then
          git clone --depth 1 https://github.com/mstorsjo/llvm-mingw.git llvm
        fi
        cd llvm
        # Ensure the destination directory exists
        mkdir -p ../llvm-mingw
        ./build-all.sh ../llvm-mingw

    - name: "🚮 Recycle Cache"
      # Only delete old caches if the build was successful
      if: success()
      uses: snnaplab/delete-branch-cache-action@v1
